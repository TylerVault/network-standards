- name: Cisco Switch Baseline
  hosts: all
  gather_facts: no
  tasks:
    - name: Gather running config 
      cisco.ios.ios_command:
        commands: show run 
        
    - name: Set hostname
      cisco.ios.ios_config:
        lines:
          - hostname {{ inventory_hostname }}

    - name: Create VLANs
      cisco.ios.ios_config:
        lines:
          - vlan {{ mgmt_vlan }}
          - name MGMT
          - vlan {{ access_vlan }}
          - name ACCESS

    - name: Configure management SVI
      cisco.ios.ios_config:
        lines:
          - interface vlan {{ mgmt_vlan }}
          - ip address {{ ansible_host }} 255.255.255.0
          - no shutdown

    - name: Set default gateway
      cisco.ios.ios_config:
        lines:
          - ip default-gateway {{ mgmt_gateway }}

    - name: Configure uplink trunk
      cisco.ios.ios_config:
        parents: "interface {{ uplink_interface }}"
        lines:
          - switchport mode trunk

    - name: Configure access ports
      cisco.ios.ios_config:
        parents: "interface range {{ access_interfaces }}"
        lines:
          - switchport mode access
          - switchport access vlan {{ access_vlan }}
          - spanning-tree portfast

    - name: Enable SSH access
      cisco.ios.ios_config:
        lines:
          - ip domain-name local 
          - crypto key generate rsa modulus 2048
          - username {{ ssh_user }} privilege 15 secret {{ ssh_pass }}
          - line vty 0 4
          - login local
          - transport input ssh
 
    - name: Save configuration
      cisco.ios.ios_config:
         save_when: always  
