- name: Bootstrap Management Access
  hosts: all
  gather_facts: no

  tasks:
    - name: Create management SVI
      cisco.ios.ios_config:
        lines:
          - interface vlan {{ mgmt_vlan }}
          - ip address {{ mgmt_ip }} 255.255.255.0
          - no shutdown

    - name: Enable SSH
      cisco.ios.ios_config:
        lines:
          - ip domain-name local
          - crypto key generate rsa modulus 2048
          - username {{ ssh_user }} privilege 15 secret {{ ssh_pass }}
          - line vty 0 4
          - login local
          - transport input ssh  
